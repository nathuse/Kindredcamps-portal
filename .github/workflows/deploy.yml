name: Deploy Static Site

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on:  ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node  
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Linters
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard serve broken-link-checker

      - name: Lint HTML
        run: htmlhint "*.html"

      - name: Lint CSS 
        run: stylelint "**/*.css"

      - name: Start Server
        run: |
          serve . -l 8000 &
          sleep 5

      - name: Check Links 
        run: blc http://localhost:8000 -ro 

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .